# ================================================================
# このファイルはリポジトリルートの netlify.toml の補足ドキュメントです。
# Netlify のビルドではリポジトリルートの netlify.toml のみが読み込まれ、
# base 配下（このファイル）は自動では読み込まれません。
# ================================================================
#
# 【有効な設定ファイル】
#   {repo_root}/netlify.toml
#     [build]
#       base    = "app"
#       command = "npm run build"
#       publish = ".next"
#
# 【Netlify 環境変数（ダッシュボードで設定）】
#   ANTHROPIC_API_KEY : Anthropic API キー（sk-ant-...）
#
# 【ローカル開発】
#   app/.env.local に ANTHROPIC_API_KEY を設定して npm run dev
#
# ================================================================
